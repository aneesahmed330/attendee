# Log rotation: without this, json-file logs grow unbounded and are the only
# copy of a crash traceback (they die with the container). 3×20MB per service.
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:
  # Dedicated BOTS worker — each run_bot task holds a slot (Chrome inside)
  # for the whole meeting. Own queue so meetings can't starve other tasks.
  attendee-worker-local:
    build: ./
    volumes:
     - .:/attendee
    networks:
      - attendee_network
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/5
      - DJANGO_SETTINGS_MODULE=attendee.settings.development
      - ENABLE_CHROME_SANDBOX=false
      - RUN_BOT_CELERY_QUEUE=bots
    command: "celery -A attendee worker -l INFO -Q bots -n bots@%h --concurrency=2"
    restart: unless-stopped
    logging: *default-logging
    # Memory caps: a leaking/hungry container gets OOM-killed and restarted
    # alone instead of freezing the whole box (see docs/issuses_solution.md).
    # Bots worker is highest — each Chrome bot needs ~1-1.5 GB.
    mem_limit: 2560m

  # Everything-else worker: webhooks, transcription processing, calendar sync.
  # Short tasks — higher concurrency, recycled every 200 tasks (the global
  # max-tasks-per-child=1 is a Zoom-SDK workaround only bots need).
  attendee-tasks-local:
    build: ./
    volumes:
     - .:/attendee
    networks:
      - attendee_network
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/5
      - DJANGO_SETTINGS_MODULE=attendee.settings.development
      - RUN_BOT_CELERY_QUEUE=bots
    command: "celery -A attendee worker -l INFO -Q celery -n tasks@%h --concurrency=4 --max-tasks-per-child=200"
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 768m

  attendee-scheduler-local:
    build: ./
    volumes:
     - .:/attendee
    networks:
      - attendee_network
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/5
      - DJANGO_SETTINGS_MODULE=attendee.settings.development
      - RUN_BOT_CELERY_QUEUE=bots
    command: "python manage.py run_scheduler"
    entrypoint: []
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m

  attendee-app-local:
    build: ./
    volumes:
     - .:/attendee
    networks:
      - attendee_network
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/5
      - DJANGO_SETTINGS_MODULE=attendee.settings.development
      - RUN_BOT_CELERY_QUEUE=bots
    # gunicorn, not runserver — Django's dev server is single-threaded and
    # not built for production traffic. Whitenoise serves static files
    # (start.sh runs collectstatic).
    command: gunicorn attendee.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 4 --timeout 120
    entrypoint: []
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 768m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  attendee-webpage-streamer-local:
    build: ./
    volumes:
     - .:/attendee
    networks:
      - attendee_network
    ports:
      - "8001:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=attendee.settings.development
      - ENABLE_CHROME_SANDBOX=true
    command: "python bots/webpage_streamer/run_webpage_streamer.py"
    security_opt:
      - seccomp=./bots/web_bot_adapter/chrome_seccomp.json
    profiles:
      - webpage-streamer


  postgres:
    image: postgres:15.3-alpine
    environment:
      POSTGRES_DB: attendee_development
      POSTGRES_USER: attendee_development_user
      POSTGRES_PASSWORD: attendee_development_user
      PGDATA: /data/postgres
    volumes:
       - postgres:/data/postgres
    networks:
      - attendee_network
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendee_development_user -d attendee_development"]
      interval: 30s
      timeout: 5s
      retries: 5


  redis:
    image: redis:7-alpine
    networks:
      - attendee_network
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - redis:/data/redis
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

networks:
  attendee_network:
    driver: bridge

volumes:
  postgres:
  redis:
